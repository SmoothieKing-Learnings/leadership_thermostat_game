<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./assets/thermometer-MMWW1_E4.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Setting the Thermostat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600&display=swap"
      rel="stylesheet"
    />
    <style>
      /* Inline splash — visible from first paint until React mounts.
         Removed once App renders into #root. */
      html, body { margin: 0; padding: 0; background: #FFF9EF; }
      #splash {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #FFF9EF;
        z-index: 9999;
        transition: opacity 0.3s ease;
      }
      #splash.hide { opacity: 0; pointer-events: none; }
      #splash .dot {
        width: 10px; height: 10px;
        margin: 0 4px;
        border-radius: 50%;
        background: #930018;
        opacity: 0.3;
        animation: pulse 1.2s ease-in-out infinite;
      }
      #splash .dot:nth-child(2) { animation-delay: 0.2s; }
      #splash .dot:nth-child(3) { animation-delay: 0.4s; }
      @keyframes pulse {
        0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
        40%           { opacity: 1;   transform: scale(1); }
      }
    </style>
    <script type="module" crossorigin src="./assets/index-D93hGLvh.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-D6hRspsM.css">
  </head>
  <body>
    <div id="splash" aria-hidden="true">
      <span class="dot"></span><span class="dot"></span><span class="dot"></span>
    </div>
    <div id="root"></div>
  </body>
</html>
